<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Ein Reiz · Aurion</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<style>
:root{--bg:#060a13;--neon:#00f2ff;--gold:#ffcc00;--text:#e8e0d0;}
*{box-sizing:border-box;margin:0;padding:0;}
body,html{width:100vw;height:100vh;background:var(--bg);overflow:hidden;font-family:'Courier New',monospace;}

#ov{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#060e1f,#0b1a2e);
  display:flex;align-items:center;justify-content:center;padding:24px;}
.ob{max-width:380px;width:100%;display:flex;flex-direction:column;gap:14px;text-align:center;}
.ob h1{color:var(--neon);font-size:1.3rem;letter-spacing:4px;text-transform:uppercase;}
.ob p{color:rgba(255,255,255,0.5);font-size:0.8rem;line-height:1.8;}
.ob .tip{color:rgba(0,242,255,0.4);font-size:0.72rem;border:1px solid rgba(0,242,255,0.15);border-radius:8px;padding:10px;}
.btn{background:rgba(0,242,255,0.07);border:2px solid var(--neon);border-radius:12px;
  padding:14px;width:100%;color:var(--neon);font-family:monospace;
  font-size:0.85rem;letter-spacing:4px;text-transform:uppercase;cursor:pointer;}

#game{position:fixed;inset:0;display:none;}

/* REIZ-OBJEKT */
#reiz{position:absolute;width:80px;height:80px;border-radius:50%;
  background:rgba(0,242,255,0.1);border:3px solid var(--neon);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;transform:translate(-50%,-50%);
  transition:background 0.3s,box-shadow 0.3s;cursor:pointer;}
#reiz.focused{background:rgba(0,242,255,0.25);
  box-shadow:0 0 40px rgba(0,242,255,0.5);}
#reiz.treffer{background:rgba(16,185,129,0.4);border-color:#10b981;
  box-shadow:0 0 60px rgba(16,185,129,0.6);}

/* FORTSCHRITT */
#progress-wrap{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  width:200px;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
#progress-fill{height:100%;width:0%;background:var(--neon);border-radius:4px;transition:width 0.1s;}

/* DOT */
#dot{position:fixed;width:14px;height:14px;border-radius:50%;
  background:rgba(0,242,255,0.7);border:2px solid var(--neon);
  transform:translate(-50%,-50%);pointer-events:none;z-index:9000;
  box-shadow:0 0 8px rgba(0,242,255,0.4);left:50%;top:50%;}

/* STATUS */
#status{position:fixed;top:16px;left:50%;transform:translateX(-50%);
  color:rgba(0,242,255,0.35);font-size:0.6rem;letter-spacing:2px;z-index:200;}
#score{position:fixed;top:40px;left:50%;transform:translateX(-50%);
  color:var(--gold);font-size:0.8rem;letter-spacing:3px;z-index:200;}

#cam{position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;}

/* Navigation */
#cam-icon{position:fixed;top:10px;left:10px;z-index:9500;
  width:44px;height:44px;border-radius:10px;
  background:rgba(14,30,60,0.9);border:2px solid rgba(239,68,68,0.6);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  cursor:pointer;transition:border-color 0.3s,background 0.3s;}
#cam-icon.cam-on{border-color:#10b981;background:rgba(16,185,129,0.15);}
#cam-icon.cam-off{border-color:rgba(239,68,68,0.6);background:rgba(239,68,68,0.1);}
#mic-icon{position:fixed;top:10px;right:10px;z-index:9500;
  width:44px;height:44px;border-radius:10px;
  background:rgba(14,30,60,0.9);border:2px solid rgba(239,68,68,0.6);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  cursor:pointer;transition:border-color 0.3s,background 0.3s;}
#mic-icon.mic-on{border-color:#10b981;background:rgba(16,185,129,0.15);}
#mic-icon.mic-off{border-color:rgba(239,68,68,0.6);background:rgba(239,68,68,0.1);}
.back-link{position:fixed;top:62px;left:10px;z-index:9500;
  color:rgba(255,255,255,0.25);font-family:monospace;font-size:0.55rem;
  letter-spacing:1px;cursor:pointer;text-decoration:none;}
.back-link:hover{color:rgba(255,255,255,0.5);}


/* Einheitliche Kopfleiste */
#top-bar{position:fixed;top:0;left:0;right:0;height:56px;z-index:9400;
  background:rgba(6,10,19,0.92);border-bottom:1px solid rgba(0,242,255,0.15);
  display:flex;align-items:center;justify-content:center;gap:10px;padding:0 12px;}
.tb-btn{border:2px solid;border-radius:10px;padding:8px 18px;
  font-family:'Courier New',monospace;font-size:0.7rem;letter-spacing:2px;
  font-weight:bold;cursor:pointer;background:transparent;transition:background 0.2s;}
.tb-start{border-color:#16a34a;color:#16a34a;}
.tb-start:hover{background:rgba(22,163,74,0.15);}
.tb-reload{border-color:#dc2626;color:#dc2626;}
.tb-reload:hover{background:rgba(220,38,38,0.15);}
.tb-clock{color:rgba(0,242,255,0.6);font-family:'Courier New',monospace;
  font-size:0.85rem;letter-spacing:2px;margin-left:8px;}
#cam-icon{top:64px !important;}
#mic-icon{top:64px !important;}
.back-link{top:116px !important;}

</style>
</head>
<body>
<div id="top-bar">
  <button class="tb-btn tb-start" onclick="startExercise()">START</button>
  <button class="tb-btn tb-reload" onclick="location.reload()">RELOAD</button>
  <span class="tb-clock" id="tb-clock">--:--</span>
</div>
<div id="cam-icon" class="cam-off" onclick="location.reload()" title="Kamera neu starten">📷</div>
<div id="mic-icon" class="mic-off" onclick="toggleMic()" title="Mikrofon an/aus">🎙️</div>
<a class="back-link" onclick="history.back()">← zurück</a>

<div id="ov">
  <div class="ob">
    <h1>Ein Reiz</h1>
    <p>Ein Objekt erscheint.<br>
    Schau es an und halte deinen Blick darauf.<br>
    Es leuchtet auf wenn du es gefunden hast.</p>
    <div class="tip">Kein Zeitdruck · Kein Stress · Einfach hinschauen</div>
    <button class="btn" onclick="startGame()">Starten</button>
  </div>
</div>

<div id="game">
  <div id="reiz">🌟</div>
  <div id="progress-wrap"><div id="progress-fill"></div></div>
  <div id="dot"></div>
  <div id="status"></div>
  <div id="score">Treffer: 0</div>
  <video id="cam" autoplay muted playsinline></video>
</div>

<script>
window.SMOOTH = window.SMOOTH || 0.09;
const DWELL_MS  = 1500;  // ms Verweilen bis Treffer
const RADIUS    = 70;    // px Trefferzone

let sx=innerWidth/2, sy=innerHeight/2;
let dwellStart=0, inZone=false;
let treffer=0;
let reizX=0, reizY=0;
const EMOJIS=['🌟','🌸','🌊','🍀','🦋','☀️','🌙','⭐'];

function placeReiz(){
  const el=document.getElementById('reiz');
  const pad=120;
  reizX=pad+Math.random()*(innerWidth-pad*2);
  reizY=pad+Math.random()*(innerHeight-pad*2);
  el.style.left=reizX+'px';
  el.style.top=reizY+'px';
  el.className='';
  el.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  document.getElementById('progress-fill').style.width='0%';
  dwellStart=0; inZone=false;
}

function checkDwell(){
  const dist=Math.hypot(sx-reizX, sy-reizY);
  const el=document.getElementById('reiz');
  const pf=document.getElementById('progress-fill');

  if(dist<RADIUS){
    if(!inZone){inZone=true;dwellStart=Date.now();}
    const elapsed=Date.now()-dwellStart;
    const pct=Math.min(100,(elapsed/DWELL_MS)*100);
    pf.style.width=pct+'%';
    el.classList.add('focused');

    if(elapsed>=DWELL_MS){
      treffer++;
      document.getElementById('score').textContent='Treffer: '+treffer;
      el.classList.remove('focused');
      el.classList.add('treffer');
      setTimeout(placeReiz, 1200);
    }
  } else {
    inZone=false; dwellStart=0;
    pf.style.width='0%';
    el.classList.remove('focused');
  }
}

async function startGame(){
  document.getElementById('ov').style.opacity='0';
  document.getElementById('ov').style.transition='opacity 0.5s';
  setTimeout(()=>document.getElementById('ov').style.display='none',500);
  document.getElementById('game').style.display='block';
  placeReiz();

  if(typeof FaceMesh==='undefined'||typeof Camera==='undefined'){
    setCam(false);
    document.getElementById('status').textContent='⚠ MediaPipe nicht geladen — Internet?';
    return;
  }
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
    document.getElementById('cam').srcObject=s;
    const fm=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    fm.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.55,minTrackingConfidence:0.55});
    fm.onResults(onR);
    new Camera(document.getElementById('cam'),{
      onFrame:async()=>{await fm.send({image:document.getElementById('cam')});},
      width:640,height:480}).start();
    setCam(true);
    document.getElementById('status').textContent='TRACKING AKTIV';
    setTimeout(()=>document.getElementById('status').textContent='',2000);
  }catch(e){setCam(false);document.getElementById('status').textContent='⚠ Kamera nicht verfügbar';}
}

function onR(r){
  if(!r.multiFaceLandmarks?.[0]) return;
  const iris=r.multiFaceLandmarks[0][468];
  if(!iris) return;
  const rawX=(0.5-iris.x)*(window.SCALE_X||10)*innerWidth+innerWidth/2;
  const rawY=(iris.y-0.5)*(window.SCALE_Y||12)*innerHeight+innerHeight/2;
  const sm=window.SMOOTH||0.09; sx+=(rawX-sx)*sm; sy+=(rawY-sy)*sm;
  const dot=document.getElementById('dot');
  dot.style.left=sx+'px'; dot.style.top=sy+'px';
  checkDwell();
}

let recognition=null;
function startMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=false;
  recognition.onresult=e=>{
    const t=e.results[e.results.length-1][0].transcript.trim().toLowerCase();
    handleVoice(t);
  };
  recognition.onend=()=>{if(recognition)recognition.start();};
  recognition.start();
}
function stopMic(){if(recognition){recognition.onend=null;recognition.stop();recognition=null;}}

function setCam(on){
  const el=document.getElementById('cam-icon');
  if(el) el.className = on ? 'cam-on' : 'cam-off';
}
function setMicIcon(on){
  const el=document.getElementById('mic-icon');
  if(el) el.className = on ? 'mic-on' : 'mic-off';
}
function handleVoice(t){}

let micActive=false;
function toggleMic(){
  if(micActive){
    stopMic(); micActive=false;
    setMicIcon(false);
  } else {
    startMic(); micActive=true;
    setMicIcon(true);
  }
} // Seite kann diese Funktion überschreiben


// Tracking-Parameter aus localStorage laden (gesetzt von index.html)
(function(){
  try {
    const saved = JSON.parse(localStorage.getItem('aurion_settings_v1') || '{}');
    if(saved.scaleX) window.SCALE_X = saved.scaleX;
    if(saved.scaleY) window.SCALE_Y = saved.scaleY;
    if(saved.smooth) window.SMOOTH  = saved.smooth;
  } catch(e) {}
})();


// Uhrzeit
function updateClock(){
  const n=new Date();
  const el=document.getElementById('tb-clock');
  if(el) el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
setInterval(updateClock,1000); updateClock();

function startExercise(){ startGame(); }
</script>
</body>
</html>
