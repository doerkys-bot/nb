<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Zwei Reize · Aurion</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<style>
:root{--bg:#060a13;--neon:#00f2ff;--gold:#ffcc00;--correct:#10b981;--wrong:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body,html{width:100vw;height:100vh;background:var(--bg);overflow:hidden;font-family:'Courier New',monospace;}

#ov{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#060e1f,#0b1a2e);
  display:flex;align-items:center;justify-content:center;padding:24px;}
.ob{max-width:380px;width:100%;display:flex;flex-direction:column;gap:14px;text-align:center;}
.ob h1{color:var(--neon);font-size:1.3rem;letter-spacing:4px;text-transform:uppercase;}
.ob p{color:rgba(255,255,255,0.5);font-size:0.8rem;line-height:1.8;}
.ob .tip{color:rgba(0,242,255,0.4);font-size:0.72rem;border:1px solid rgba(0,242,255,0.15);border-radius:8px;padding:10px;}
.btn{background:rgba(0,242,255,0.07);border:2px solid var(--neon);border-radius:12px;
  padding:14px;width:100%;color:var(--neon);font-family:monospace;
  font-size:0.85rem;letter-spacing:4px;text-transform:uppercase;cursor:pointer;}

#game{position:fixed;inset:0;display:none;}

/* AUFGABE */
#task{position:fixed;top:20px;left:50%;transform:translateX(-50%);
  color:var(--gold);font-size:1.1rem;letter-spacing:3px;z-index:200;text-align:center;}
#task-label{color:rgba(255,255,255,0.3);font-size:0.6rem;letter-spacing:3px;
  text-align:center;margin-bottom:6px;}

/* OBJEKTE */
.obj{position:absolute;width:90px;height:90px;border-radius:50%;
  background:rgba(255,255,255,0.04);border:2.5px solid rgba(0,242,255,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;transform:translate(-50%,-50%);
  transition:background 0.2s,box-shadow 0.2s;}
.obj.focused{background:rgba(0,242,255,0.15);border-color:var(--neon);
  box-shadow:0 0 30px rgba(0,242,255,0.4);}
.obj.correct{background:rgba(16,185,129,0.35);border-color:var(--correct);
  box-shadow:0 0 40px rgba(16,185,129,0.5);}
.obj.wrong{background:rgba(239,68,68,0.25);border-color:var(--wrong);}

/* FORTSCHRITT (Verweilzeit) */
#dwell-bar{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  width:180px;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
#dwell-fill{height:100%;width:0%;background:var(--neon);border-radius:3px;transition:width 0.08s;}

/* DOT */
#dot{position:fixed;width:14px;height:14px;border-radius:50%;
  background:rgba(0,242,255,0.7);border:2px solid var(--neon);
  transform:translate(-50%,-50%);pointer-events:none;z-index:9000;
  box-shadow:0 0 8px rgba(0,242,255,0.4);left:50%;top:50%;}

#score{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  color:rgba(0,242,255,0.3);font-size:0.6rem;letter-spacing:3px;}
#status{position:fixed;top:80px;left:50%;transform:translateX(-50%);
  color:rgba(0,242,255,0.3);font-size:0.58rem;letter-spacing:2px;}
#cam{position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;}

/* Navigation */
#nav-bar{position:fixed;top:10px;right:10px;z-index:9500;
  display:flex;gap:8px;align-items:center;}
.mic-btn{background:transparent;border:1.5px solid;border-radius:8px;
  padding:6px 12px;font-family:monospace;font-size:0.6rem;letter-spacing:2px;
  cursor:pointer;transition:background 0.2s;}
.mic-on{border-color:rgba(16,185,129,0.6);color:rgba(16,185,129,0.8);}
.mic-on:hover{background:rgba(16,185,129,0.12);}
.mic-off{border-color:rgba(239,68,68,0.5);color:rgba(239,68,68,0.7);}
.mic-off:hover{background:rgba(239,68,68,0.1);}
.back-link{color:rgba(255,255,255,0.2);font-family:monospace;font-size:0.58rem;
  letter-spacing:2px;cursor:pointer;text-decoration:none;
  transition:color 0.2s;}
.back-link:hover{color:rgba(255,255,255,0.5);}

</style>
</head>
<body>
<div id="nav-bar">
  <a class="back-link" onclick="history.back()">← zurück</a>
  <button class="mic-btn mic-on" onclick="startMic()">Mikrofon an</button>
  <button class="mic-btn mic-off" onclick="stopMic()">Mikrofon aus</button>
</div>

<div id="ov">
  <div class="ob">
    <h1>Zwei Reize</h1>
    <p>Zwei Objekte erscheinen.<br>
    Schau auf das richtige und halte deinen Blick.<br>
    Das gesuchte Objekt wird dir gezeigt.</p>
    <div class="tip">Kein Zeitdruck · Ruhig schauen · Verweilen genügt</div>
    <button class="btn" onclick="startGame()">Starten</button>
  </div>
</div>

<div id="game">
  <div id="task-label">SUCHE</div>
  <div id="task">?</div>
  <div id="obj1" class="obj"></div>
  <div id="obj2" class="obj"></div>
  <div id="dwell-bar"><div id="dwell-fill"></div></div>
  <div id="dot"></div>
  <div id="score">Richtig: 0 · Falsch: 0</div>
  <div id="status"></div>
  <video id="cam" autoplay muted playsinline></video>
</div>

<script>
window.SMOOTH = 0.09;
const DWELL_MS = 2000;
const RADIUS   = 75;
const PAIRS = [
  ['🌸','🌊'],['🦋','🌟'],['☀️','🌙'],['🍀','🌺'],
  ['🐝','🐠'],['🍎','🍋'],['⭐','🌈'],['🦅','🐬']
];

let sx=innerWidth/2, sy=innerHeight/2;
let dwellStart=0, focusedObj=null;
let richtig=0, falsch=0;
let targetIdx=0;
let obj1={x:0,y:0}, obj2={x:0,y:0};
let locked=false;

function nextRound(){
  locked=false;
  const pair=PAIRS[Math.floor(Math.random()*PAIRS.length)];
  const shuffle=Math.random()>0.5;
  const emA=shuffle?pair[1]:pair[0];
  const emB=shuffle?pair[0]:pair[1];
  targetIdx=Math.random()>0.5?1:2;

  document.getElementById('task').textContent=targetIdx===1?emA:emB;
  document.getElementById('obj1').textContent=emA;
  document.getElementById('obj2').textContent=emB;
  document.getElementById('obj1').className='obj';
  document.getElementById('obj2').className='obj';
  document.getElementById('dwell-fill').style.width='0%';

  const pad=130;
  // Objekte links und rechts platzieren
  obj1.x=pad+Math.random()*(innerWidth/2-pad*1.5);
  obj1.y=pad+Math.random()*(innerHeight-pad*2);
  obj2.x=innerWidth/2+Math.random()*(innerWidth/2-pad);
  obj2.y=pad+Math.random()*(innerHeight-pad*2);

  document.getElementById('obj1').style.left=obj1.x+'px';
  document.getElementById('obj1').style.top=obj1.y+'px';
  document.getElementById('obj2').style.left=obj2.x+'px';
  document.getElementById('obj2').style.top=obj2.y+'px';

  dwellStart=0; focusedObj=null;
}

function checkDwell(){
  if(locked) return;
  const d1=Math.hypot(sx-obj1.x,sy-obj1.y);
  const d2=Math.hypot(sx-obj2.x,sy-obj2.y);
  const el1=document.getElementById('obj1');
  const el2=document.getElementById('obj2');
  const pf=document.getElementById('dwell-fill');

  let nearest=null, nearestDist=999;
  if(d1<RADIUS){nearest=1;nearestDist=d1;}
  if(d2<RADIUS&&d2<d1){nearest=2;nearestDist=d2;}

  if(nearest){
    if(focusedObj!==nearest){focusedObj=nearest;dwellStart=Date.now();}
    const elapsed=Date.now()-dwellStart;
    const pct=Math.min(100,(elapsed/DWELL_MS)*100);
    pf.style.width=pct+'%';
    el1.className='obj'+(nearest===1?' focused':'');
    el2.className='obj'+(nearest===2?' focused':'');

    if(elapsed>=DWELL_MS){
      locked=true;
      if(nearest===targetIdx){
        richtig++;
        (nearest===1?el1:el2).className='obj correct';
      } else {
        falsch++;
        (nearest===1?el1:el2).className='obj wrong';
      }
      document.getElementById('score').textContent=
        'Richtig: '+richtig+' · Falsch: '+falsch;
      setTimeout(nextRound,1500);
    }
  } else {
    focusedObj=null; dwellStart=0;
    pf.style.width='0%';
    el1.className='obj'; el2.className='obj';
  }
}

async function startGame(){
  document.getElementById('ov').style.opacity='0';
  document.getElementById('ov').style.transition='opacity 0.5s';
  setTimeout(()=>document.getElementById('ov').style.display='none',500);
  document.getElementById('game').style.display='block';
  nextRound();

  try{
    const s=await navigator.mediaDevices.getUserMedia({video:true});
    document.getElementById('cam').srcObject=s;
    const fm=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    fm.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.55,minTrackingConfidence:0.55});
    fm.onResults(onR);
    new Camera(document.getElementById('cam'),{
      onFrame:async()=>{await fm.send({image:document.getElementById('cam')});},
      width:320,height:240}).start();
    document.getElementById('status').textContent='TRACKING AKTIV';
    setTimeout(()=>document.getElementById('status').textContent='',2000);
  }catch(e){document.getElementById('status').textContent='⚠ Kamera nicht verfügbar';}
}

function onR(r){
  if(!r.multiFaceLandmarks?.[0]) return;
  const iris=r.multiFaceLandmarks[0][468];
  if(!iris) return;
  const rawX=(0.5-iris.x)*(window.SCALE_X||10)*innerWidth+innerWidth/2;
  const rawY=(iris.y-0.5)*(window.SCALE_Y||12)*innerHeight+innerHeight/2;
  sx+=(rawX-sx)*window.SMOOTH; sy+=(rawY-sy)*window.SMOOTH;
  const dot=document.getElementById('dot');
  dot.style.left=sx+'px'; dot.style.top=sy+'px';
  checkDwell();
}

let recognition=null;
function startMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=false;
  recognition.onresult=e=>{
    const t=e.results[e.results.length-1][0].transcript.trim().toLowerCase();
    handleVoice(t);
  };
  recognition.onend=()=>{if(recognition)recognition.start();};
  recognition.start();
}
function stopMic(){if(recognition){recognition.onend=null;recognition.stop();recognition=null;}}
function handleVoice(t){} // Seite kann diese Funktion überschreiben


// Tracking-Parameter aus localStorage laden (gesetzt von index.html)
(function(){
  try {
    const saved = JSON.parse(localStorage.getItem('aurion_settings_v1') || '{}');
    if(saved.scaleX) window.SCALE_X = saved.scaleX;
    if(saved.scaleY) window.SCALE_Y = saved.scaleY;
    if(saved.smooth) window.SMOOTH  = saved.smooth;
  } catch(e) {}
})();

</script>
</body>
</html>
