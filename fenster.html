<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Fenster · Aurion Aufmerksamkeit</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<style>
:root{--bg:#0a0a0f;--neon:#00f2ff;--gold:#ffcc00;--fire:#ff6600;--text:#e8e0d0;}
*{box-sizing:border-box;margin:0;padding:0;}
body,html{width:100vw;height:100vh;background:var(--bg);overflow:hidden;font-family:'Courier New',monospace;}

/* CONSENT */
#ov{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#060e1f,#0b1a2e);
  display:flex;align-items:center;justify-content:center;padding:24px;}
.ob{max-width:380px;width:100%;display:flex;flex-direction:column;gap:14px;text-align:center;}
.ob h1{color:var(--neon);font-size:1.3rem;letter-spacing:4px;text-transform:uppercase;}
.ob p{color:rgba(255,255,255,0.5);font-size:0.8rem;line-height:1.7;}
.ob .tip{color:rgba(0,242,255,0.4);font-size:0.72rem;letter-spacing:1px;
  border:1px solid rgba(0,242,255,0.15);border-radius:8px;padding:10px;}
.btn{background:rgba(0,242,255,0.07);border:2px solid var(--neon);border-radius:12px;
  padding:14px;width:100%;color:var(--neon);font-family:monospace;
  font-size:0.85rem;letter-spacing:4px;text-transform:uppercase;cursor:pointer;}

/* SPIEL */
#game{position:fixed;inset:0;display:none;}

/* GEBÄUDE */
#scene{position:absolute;inset:0;}

/* AUFMERKSAMKEITS-BAR */
#attn-bar-wrap{position:fixed;left:16px;top:10%;bottom:10%;width:18px;z-index:100;}
#attn-bar-bg{width:100%;height:100%;background:rgba(255,255,255,0.06);border-radius:9px;
  border:1px solid rgba(0,242,255,0.15);overflow:hidden;position:relative;}
#attn-bar-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,var(--neon),var(--gold));
  border-radius:9px;transition:height 0.3s ease;}
#attn-label{position:fixed;left:8px;top:calc(10% - 20px);font-size:0.5rem;
  color:rgba(0,242,255,0.4);letter-spacing:2px;writing-mode:horizontal-tb;}

/* DOT */
#dot{position:fixed;width:14px;height:14px;border-radius:50%;
  background:rgba(0,242,255,0.7);border:2px solid var(--neon);
  transform:translate(-50%,-50%);pointer-events:none;z-index:9000;
  box-shadow:0 0 10px rgba(0,242,255,0.4);left:50%;top:50%;}

/* STATUS */
#status{position:fixed;top:12px;left:50%;transform:translateX(-50%);
  color:rgba(0,242,255,0.4);font-family:monospace;font-size:0.6rem;letter-spacing:2px;z-index:200;}

/* BELOHNUNG */
#reward{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);z-index:5000;flex-direction:column;gap:16px;}
#reward h2{color:var(--gold);font-size:1.5rem;letter-spacing:4px;text-align:center;}
#reward p{color:rgba(255,255,255,0.5);font-size:0.8rem;letter-spacing:2px;}

#cam{position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;}

/* Navigation UI - Korrigierte Buttons */
.nav-btn {
  position: fixed;
  z-index: 9500;
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: rgba(14, 30, 60, 0.9);
  border: 2px solid rgba(239, 68, 68, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
  outline: none;
  padding: 0;
}
#cam-icon { top: 64px !important; }
#cam-icon.cam-on { border-color: #10b981; background: rgba(16, 185, 129, 0.15); }
#cam-icon.cam-off { border-color: rgba(239, 68, 68, 0.6); background: rgba(239, 68, 68, 0.1); }

#mic-icon { top: 64px !important; right: 10px; }
#mic-icon.mic-on { border-color: #10b981; background: rgba(16, 185, 129, 0.15); }
#mic-icon.mic-off { border-color: rgba(239, 68, 68, 0.6); background: rgba(239, 68, 68, 0.1); }

.back-btn {
  position: fixed;
  top: 130px !important; 
  left: 10px;
  z-index: 9500;
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.25);
  font-family: monospace;
  font-size: 0.65rem;
  letter-spacing: 1px;
  cursor: pointer;
  text-align: left;
}
.back-btn:hover { color: rgba(255, 255, 255, 0.5); }


/* Einheitliche Kopfleiste */
#top-bar{position:fixed;top:0;left:0;right:0;height:56px;z-index:9400;
  background:rgba(6,10,19,0.92);border-bottom:1px solid rgba(0,242,255,0.15);
  display:flex;align-items:center;justify-content:center;gap:10px;padding:0 12px;}
.tb-btn{border:2px solid;border-radius:10px;padding:8px 18px;
  font-family:'Courier New',monospace;font-size:0.7rem;letter-spacing:2px;
  font-weight:bold;cursor:pointer;background:transparent;transition:background 0.2s;}
.tb-start{border-color:#16a34a;color:#16a34a;}
.tb-start:hover{background:rgba(22,163,74,0.15);}
.tb-reload{border-color:#dc2626;color:#dc2626;}
.tb-reload:hover{background:rgba(220,38,38,0.15);}
.tb-clock{color:rgba(0,242,255,0.6);font-family:'Courier New',monospace;
  font-size:0.85rem;letter-spacing:2px;margin-left:8px;}

</style>
</head>
<body>
<div id="top-bar">
  <button class="tb-btn tb-start" onclick="startExercise()">START</button>
  <button class="tb-btn tb-reload" onclick="location.reload()">RELOAD</button>
  <span class="tb-clock" id="tb-clock">--:--</span>
</div >

<!-- Korrigierte Navigationselemente -->
<button id="cam-icon" class="nav-btn cam-off" onclick="handleCameraReset()" title="Kamera neu starten">📷</button>
<button id="mic-icon" class="nav-btn mic-off" onclick="toggleMic()" title="Mikrofon an/aus">🎙️</button>
<button class="back-btn" onclick="handleBack()">← zurück</button>

<!-- CONSENT -->
<div id="ov">
  <div class="ob">
    <h1>🔥 Fenster</h1>
    <p>Halte deinen Blick ruhig — der Feuerwehrmann steigt.<br>
    Wandert dein Blick ab, steigt er ab.</p>
    <div class="tip">
      📷 Kamera lokal · Kein Server · Keine Speicherung
    </div >
    <button class="btn" onclick="startGame()">Starten</button>
  </div >
</div >

<!-- SPIEL -->
<div id="game">
  <canvas id="scene"></canvas>
  <div id="attn-bar-wrap">
    <div id="attn-label">FOKUS</div >
    <div id="attn-bar-bg">
      <div id="attn-bar-fill" style="height:0%"></div >
    </div >
  </div >
  <div id="dot"></div >
  <div id="status"></div >
  <video id="cam" autoplay muted playsinline></video>
</div >

<!-- BELOHNUNG -->
<div id="reward">
  <h2 >🪟 Fenster erreicht!</h2 >
  <p>Weiter aufsteigen...</p>
</div >

<script>
// ── ZUSTAND ────────────────────────────────────────────────────────
const SMOOTH     = 0.10;  // Dot-Glättung
const WIN_SIZE   = 30;    // Frames für Stabilitätsmessung
const STAB_THRESH = 0.018; // Max erlaubte Abweichung (normiert)
const CLIMB_SPEED = 0.4;  // Aufstieg pro stabilem Frame (%)
const DESCEND_SPEED = 0.6; // Abstieg pro unruhigem Frame (%)

let sx = innerWidth/2, sy = innerHeight/2;
let dotHistory = [];   // letzte N Dot-Positionen
let attnLevel  = 0;    // 0..100
let fireman_y  = 100;  // Position auf der Leiter (100=unten, 0=oben)
let windows    = [];   // Fensterpositionen (% von oben)
let rewardTimeout = null;
let showingReward = false;

// --- NAVIGATION HANDLER ---
function handleBack() { window.history.back(); }
function handleCameraReset() { location.reload(); }

// ── FENSTER-POSITIONEN ──────────────────────────────────────────────
function initWindows() {
  windows = [75, 50, 25]; // in % von oben (Leiterpos)
}

// ── CANVAS ZEICHNEN ────────────────────────────────────────────────
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Himmel + Rauch
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0a0308');
  sky.addColorStop(1, '#1a0505');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Rauch-Partikel (statisch für Perf)
  ctx.fillStyle = 'rgba(80,40,20,0.12)';
  for(let i=0;i<6;i++){
    ctx.beginPath();
    ctx.arc(W*0.55+Math.sin(Date.now()/2000+i)*30, H*0.1+i*20, 30+i*15, 0, Math.PI*2);
    ctx.fill();
  }

  // GEBÄUDE
  const bx = W*0.35, bw = W*0.5, bh = H*0.82, by = H-bh;
  ctx.fillStyle = '#1a0a05';
  ctx.fillRect(bx, by, bw, bh);

  // Gebäude-Rand
  ctx.strokeStyle = '#3a1a08';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);

  // FENSTER zeichnen
  const cols = 3, rows = 4;
  const fw = bw/cols*0.55, fh = H*0.10;
  const xpad = (bw/cols)*(1-0.55)/2;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const fx = bx + c*(bw/cols) + xpad;
      const fy = by + H*0.06 + r*(bh-H*0.06)/rows;

      // Fensternummer als Ziel (obere 3 Fenster der Mitte)
      const isTarget = c===1 && r<3;
      const targetIdx = r; // 0=oben, 1=mitte, 2=unten

      // Erreicht?
      const reached = isTarget && windows[targetIdx] < 0;

      ctx.fillStyle = reached ? '#ffcc00' :
        (isTarget ? `rgba(255,${80+r*40},0,0.3)` : 'rgba(255,120,0,0.15)');
      ctx.fillRect(fx, fy, fw, fh);
      ctx.strokeStyle = reached ? '#ffcc00' : 'rgba(255,100,0,0.4)';
      ctx.lineWidth = reached ? 2 : 1;
      ctx.strokeRect(fx, fy, fw, fh);

      // Feuer-Schein in nicht-erreichten Fenstern
      if(!reached){
        ctx.fillStyle = `rgba(255,${60+Math.sin(Date.now()/300+r+c)*30},0,0.15)`;
        ctx.fillRect(fx, fy, fw, fh);
      }
    }
  }

  // LEITER
  const lx = bx - 12;
  const ltop = by + H*0.03;
  const lbot = H - 20;
  ctx.strokeStyle = '#8888aa';
  ctx.lineWidth = 3;
  // Holme
  ctx.beginPath(); ctx.moveTo(lx-8,ltop); ctx.lineTo(lx-8,lbot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx+8,ltop); ctx.lineTo(lx+8,lbot); ctx.stroke();
  // Sprossen
  const rungs = 16;
  for(let i=0;i<=rungs;i++){
    const ry = ltop + (lbot-ltop)*i/rungs;
    ctx.beginPath(); ctx.moveTo(lx-8,ry); ctx.lineTo(lx+8,ry); ctx.stroke();
  }

  // FEUERWEHRMANN
  const fy_px = ltop + (lbot-ltop)*(fireman_y/100);
  drawFireman(lx, fy_px);

  requestAnimationFrame(draw);
}

function drawFireman(x, y) {
  ctx.save();
  // Helm
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.ellipse(x, y-18, 9, 6, 0, 0, Math.PI*2);
  ctx.fill();
  // Kopf
  ctx.fillStyle = '#f4c080';
  ctx.beginPath();
  ctx.arc(x, y-10, 6, 0, Math.PI*2);
  ctx.fill();
  // Körper
  ctx.fillStyle = '#cc2200';
  ctx.fillRect(x-7, y-4, 14, 14);
  // Beine
  ctx.fillStyle = '#333';
  ctx.fillRect(x-5, y+10, 4, 10);
  ctx.fillRect(x+1, y+10, 4, 10);
  ctx.restore();
}

// ── AUFMERKSAMKEIT BERECHNEN ──────────────────────────────────────
function calcStability() {
  if(dotHistory.length < 10) return 0;
  const n = Math.min(WIN_SIZE, dotHistory.length);
  const recent = dotHistory.slice(-n);
  const mx = recent.reduce((s,p)=>s+p.x,0)/n;
  const my = recent.reduce((s,p)=>s+p.y,0)/n;
  const variance = recent.reduce((s,p)=>s+Math.hypot(p.x-mx,p.y-my),0)/n;
  const normVar = variance / Math.max(innerWidth, innerHeight);
  return Math.max(0, 1 - normVar/STAB_THRESH);
}

function updateGame(stability) {
  if(showingReward) return;

  // Aufmerksamkeitslevel anpassen
  if(stability > 0.5) {
    attnLevel = Math.min(100, attnLevel + CLIMB_SPEED * stability);
  } else {
    attnLevel = Math.max(0, attnLevel - DESCEND_SPEED * (1-stability));
  }

  // Attn-Bar aktualisieren
  document.getElementById('attn-bar-fill').style.height = attnLevel + '%';

  // Feuerwehrmann bewegen: hohe Aufmerksamkeit = Aufstieg (fireman_y sinkt)
  if(attnLevel > 60) {
    fireman_y = Math.max(0, fireman_y - 0.15);
  } else if(attnLevel < 30) {
    fireman_y = Math.min(100, fireman_y + 0.10);
  }

  // Fenster erreicht?
  for(let i=0; i<windows.length; i++){
    if(windows[i] > 0 && fireman_y <= windows[i]){
      windows[i] = -1; // als erreicht markieren
      showReward(i);
      return;
    }
  }
}

function showReward(windowIdx) {
  showingReward = true;
  const el = document.getElementById('reward');
  el.style.display = 'flex';
  clearTimeout(rewardTimeout);
  rewardTimeout = setTimeout(()=>{
    el.style.display = 'none';
    showingReward = false;
    // Feuerwehrmann wieder unten
    fireman_y = 100;
    attnLevel = 0;
  }, 2500);
}

// ── EYE TRACKING ──────────────────────────────────────────────────
async function startGame() {
  document.getElementById('ov').style.opacity = '0';
  document.getElementById('ov').style.transition = 'opacity 0.5s';
  setTimeout(()=>{ document.getElementById('ov').style.display='none'; }, 500);
  document.getElementById('game').style.display = 'block';
  initWindows();
  draw();

  if(typeof FaceMesh==='undefined'||typeof Camera==='undefined'){
    setCam(false);
    document.getElementById('status').textContent='⚠ MediaPipe nicht geladen — Internet?';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
    document.getElementById('cam').srcObject = stream;
    const fm = new FaceMesh({locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    fm.setOptions({maxNumFaces:1, refineLandmarks:true,
      minDetectionConfidence:0.55, minTrackingConfidence:0.55});
    fm.onResults(onResults);
    new Camera(document.getElementById('cam'), {
      onFrame: async () => { await fm.send({image: document.getElementById('cam')}); },
      width: 640, height: 480
    }).start();
    setCam(true);
    document.getElementById('status').textContent = 'TRACKING AKTIV';
    setTimeout(()=>{ document.getElementById('status').textContent=''; }, 2000);
  } catch(e) {
    setCam(false);
    document.getElementById('status').textContent = '⚠ Kamera nicht verfügbar';
  }
}

function onResults(r) {
  if(!r.multiFaceLandmarks?.[0]) return;
  const lm  = r.multiFaceLandmarks[0];
  const iris = lm[468];
  if(!iris) return;

  // Dot glätten
  const rawX = (0.5 - iris.x) * 10 * innerWidth  + innerWidth  / 2;
  const rawY = (iris.y - 0.5) * 12 * innerHeight + innerHeight / 2;
  const sm=window.SMOOTH||0.09; sx += (rawX - sx) * sm;
  sy += (rawY - sy) * sm;

  // Dot anzeigen
  const dot = document.getElementById('dot');
  dot.style.left = sx + 'px';
  dot.style.top  = sy + 'px';

  // Verlauf aufzeichnen
  dotHistory.push({x: sx, y: sy});
  if(dotHistory.length > WIN_SIZE * 2) dotHistory.shift();

  // Stabilität berechnen und Spiel aktualisieren
  const stability = calcStability();
  updateGame(stability);
}

let recognition=null;
function startMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=false;
  recognition.onresult=e=>{
    const t=e.results[e.results.length-1][0].transcript.trim().toLowerCase();
    handleVoice(t);
  };
  recognition.onend=()=>{if(recognition)recognition.start();};
  recognition.start();
}
function stopMic(){if(recognition){recognition.onend=null;recognition.stop();recognition=null;}}

function setCam(on){
  const el=document.getElementById('cam-icon');
  if(el) el.className = on ? 'nav-btn cam-on' : 'nav-btn cam-off';
}
function setMicIcon(on){
  const el=document.getElementById('mic-icon');
  if(el) el.className = on ? 'nav-btn mic-on' : 'nav-btn mic-off';
}
function handleVoice(t){}

let micActive=false;
function toggleMic(){
  if(micActive){
    stopMic(); micActive=false;
    setMicIcon(false);
  } else {
    startMic(); micActive=true;
    setMicIcon(true);
  }
}


// Tracking-Parameter aus localStorage laden (gesetzt von index.html)
(function(){
  try {
    const saved = JSON.parse(localStorage.getItem('aurion_settings_v1') || '{}');
    if(saved.scaleX) window.SCALE_X = saved.scaleX;
    if(saved.scaleY) window.SCALE_Y = saved.scaleY;
    if(saved.smooth) window.SMOOTH  = saved.smooth;
  } catch(e) {}
})();


// Uhrzeit
function updateClock(){
  const n=new Date();
  const el=document.getElementById('tb-clock');
  if(el) el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
setInterval(updateClock,1000); updateClock();

function startExercise(){ startGame(); }
</script>
</body>
</html>
